<div class="overlay" *ngIf="isOpen" (click)="closeOnBackdrop($event)">
  <div class="dialog" role="dialog" aria-modal="true">

    <!-- Close -->
    <button class="close-btn" (click)="close()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"
        stroke-linecap="round">
        <line x1="18" y1="6" x2="6" y2="18" />
        <line x1="6" y1="6" x2="18" y2="18" />
      </svg>
    </button>

    <!-- Logo mark -->
    <div class="dialog-logo">
      <span class="logo-arrows">&gt;&gt;&gt;</span> BARTR
    </div>

    <!-- Tabs -->
    <div class="tabs">
      <button class="tab" [class.active]="activeTab === 'login'" (click)="activeTab = 'login'">შესვლა</button>
      <button class="tab" [class.active]="activeTab === 'register'"
        (click)="activeTab = 'register'">რეგისტრაცია</button>
    </div>

    <!-- ── LOGIN ── -->
    <form *ngIf="activeTab === 'login'" class="form" (ngSubmit)="onLogin()">
      <div class="field">
        <label>ელ.ფოსტა ან ტელეფონი</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          <input [(ngModel)]="loginForm.email" name="email" type="text" placeholder="მაგ. user@example.com" />
        </div>
      </div>

      <div class="field">
        <label>პაროლი</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input [(ngModel)]="loginForm.password" name="password" [type]="showPassword ? 'text' : 'password'"
            placeholder="პაროლი" />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            <svg *ngIf="!showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
            <svg *ngIf="showPassword" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round">
              <path
                d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
              <line x1="1" y1="1" x2="23" y2="23" />
            </svg>
          </button>
        </div>
      </div>

      <div class="form-links">
        <span>პაროლი დაგავიწყდა? <a href="#" (click)="$event.preventDefault()">აღდგენა</a></span>
      </div>

      <button type="submit" class="btn-primary" [disabled]="loading">
        <span *ngIf="!loading">შესვლა</span>
        <span *ngIf="loading" class="spinner"></span>
      </button>

      <!-- Error message -->
      <div class="error-msg" *ngIf="errorMessage">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
          stroke-linecap="round">
          <circle cx="12" cy="12" r="10" />
          <line x1="12" y1="8" x2="12" y2="12" />
          <line x1="12" y1="16" x2="12.01" y2="16" />
        </svg>
        {{ errorMessage }}
      </div>

      <div class="divider"><span>ან</span></div>

      <button type="button" class="btn-social" (click)="loginWithGoogle()" [disabled]="loading">
        <svg width="17" height="17" viewBox="0 0 24 24">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Gmail-ით შესვლა
      </button>

      <p class="switch-text">ანგარიში არ გაქვს? <a (click)="activeTab = 'register'" href="#">დარეგისტრირდი</a></p>
    </form>

    <!-- ── REGISTER ── -->
    <form *ngIf="activeTab === 'register'" class="form" (ngSubmit)="onRegister()">

      <div class="fields-row" *ngIf="personType === 'physical'">
        <div class="field">
          <label>სახელი</label>
          <div class="input-wrap">
            <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
              stroke-width="2" stroke-linecap="round">
              <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
              <circle cx="12" cy="7" r="4" />
            </svg>
            <input [(ngModel)]="registerForm.firstName" name="firstName" type="text" />
          </div>
        </div>
        <div class="field">
          <label>გვარი</label>
          <div class="input-wrap">
            <input [(ngModel)]="registerForm.lastName" name="lastName" type="text" />
          </div>
        </div>
      </div>

      <div class="field">
        <label>ელ.ფოსტა</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
            <polyline points="22,6 12,13 2,6" />
          </svg>
          <input [(ngModel)]="registerForm.email" name="email" type="email" placeholder="მაგ. user@example.com" />
        </div>
      </div>

      <div class="field">
        <label>ტელეფონი</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <path
              d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 13a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.6 2h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.27-1.27a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z" />
          </svg>
          <input [(ngModel)]="registerForm.phone" name="phone" type="tel" placeholder="+995 5XX XXX XXX" />
        </div>
      </div>

      <div class="field">
        <label>პაროლი</label>
        <div class="input-wrap">
          <svg class="input-icon" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
            stroke-width="2" stroke-linecap="round">
            <rect x="3" y="11" width="18" height="11" rx="2" />
            <path d="M7 11V7a5 5 0 0 1 10 0v4" />
          </svg>
          <input [(ngModel)]="registerForm.password" name="password" [type]="showPassword ? 'text' : 'password'"
            placeholder="მინ. 8 სიმბოლო" />
          <button type="button" class="toggle-pass" (click)="showPassword = !showPassword">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
              stroke-linecap="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
              <circle cx="12" cy="12" r="3" />
            </svg>
          </button>
        </div>
      </div>

      <div class="terms-row">
        <input type="checkbox" id="terms" [(ngModel)]="registerForm.terms" name="terms" />
        <label for="terms">ვეთანხმები <a href="#" (click)="$event.preventDefault()">წესებსა და პირობებს</a></label>
      </div>

      <button type="submit" class="btn-primary">რეგისტრაცია</button>

      <div class="divider"><span>ან</span></div>

      <button type="button" class="btn-social">
        <svg width="17" height="17" viewBox="0 0 24 24" fill="#1877F2">
          <path
            d="M24 12.073c0-6.627-5.373-12-12-12s-12 5.373-12 12c0 5.99 4.388 10.954 10.125 11.854v-8.385H7.078v-3.47h3.047V9.43c0-3.007 1.792-4.669 4.533-4.669 1.312 0 2.686.235 2.686.235v2.953H15.83c-1.491 0-1.956.925-1.956 1.874v2.25h3.328l-.532 3.47h-2.796v8.385C19.612 23.027 24 18.062 24 12.073z" />
        </svg>
        Facebook-ით რეგისტრაცია
      </button>

      <button type="button" class="btn-social">
        <svg width="17" height="17" viewBox="0 0 24 24">
          <path fill="#4285F4"
            d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" />
          <path fill="#34A853"
            d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" />
          <path fill="#FBBC05"
            d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" />
          <path fill="#EA4335"
            d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.47 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" />
        </svg>
        Gmail-ით რეგისტრაცია
      </button>

      <p class="switch-text">უკვე გაქვს ანგარიში? <a (click)="activeTab = 'login'" href="#">შესვლა</a></p>
    </form>

  </div>
</div>
