<header class="topbar">
  <div class="topbar__inner">
    <!-- LEFT: Logo -->
    <div class="brand">
      <span class="brand__mark">
        <span class="chev"></span>
        <span class="chev"></span>
        <span class="chev"></span>
      </span>
      <span class="brand__text">BARTR</span>
    </div>

    <!-- RIGHT: Actions -->
    <div class="actions">
      <div class="vault">
        <div class="vault__icon">M</div>
        <div class="vault__meta">
          <div class="vault__title">Monet Vault</div>
          <div class="vault__sub">5/10 Monets remaining today</div>
        </div>
        <button class="vault__add" type="button" aria-label="Add Monets">+</button>
      </div>

      <!-- Bell For Notifications -->
      <button class="notification-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-bell-icon lucide-bell">
          <path d="M10.268 21a2 2 0 0 0 3.464 0" />
          <path
            d="M3.262 15.326A1 1 0 0 0 4 17h16a1 1 0 0 0 .74-1.673C19.41 13.956 18 12.499 18 8A6 6 0 0 0 6 8c0 4.499-1.411 5.956-2.738 7.326" />
        </svg>
      </button>


      <!-- If user is NOT logged in -->

      <button class="login-btn" (click)="showAuth = true">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
          stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
          class="lucide lucide-user-icon lucide-user">
          <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2" />
          <circle cx="12" cy="7" r="4" />
        </svg>
      </button>

      <app-auth-dialog [isOpen]="showAuth" (closed)="showAuth = false"></app-auth-dialog>

      <!-- If user IS logged in, replace buttons above with avatar menu later -->
      <!-- <button class="avatar" type="button" aria-label="Account">
        <img src="assets/images/avatar.png" alt="avatar" />
      </button> -->
    </div>
  </div>
</header>
