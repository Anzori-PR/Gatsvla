<header class="topbar">
  <div class="topbar__inner">
    <!-- LEFT: Logo -->
    <div class="brand">
      <span class="brand__mark">
        <span class="chev"></span>
        <span class="chev"></span>
        <span class="chev"></span>
      </span>
      <span class="brand__text">BARTR</span>
    </div>

    <!-- RIGHT: Actions -->
    <div class="actions">
      <div class="vault">
        <div class="vault__icon">M</div>
        <div class="vault__meta">
          <div class="vault__title">Monet Vault</div>
          <div class="vault__sub">5/10 Monets remaining today</div>
        </div>
        <button class="vault__add" type="button" aria-label="Add Monets">+</button>
      </div>

      <!-- If user is NOT logged in -->
      <button class="btn btn--ghost" type="button">Login</button>
      <button class="btn btn--primary" type="button">Register</button>

      <!-- If user IS logged in, replace buttons above with avatar menu later -->
      <!-- <button class="avatar" type="button" aria-label="Account">
        <img src="assets/images/avatar.png" alt="avatar" />
      </button> -->
    </div>
  </div>
</header>
