<!-- EMPTY STATE -->
<div *ngIf="!chat" class="empty-state">
  <div class="empty-inner">
    <div class="empty-icon">
      <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2">
        <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
      </svg>
    </div>
    <h3>Select a Trade Conversation</h3>
    <p>Choose a trade from the left to start chatting</p>
  </div>
</div>

<!-- CHAT VIEW -->
<div *ngIf="chat" class="chat-window">

  <!-- HEADER -->
  <div class="chat-header">
    <div class="header-left">
      <!-- Mobile back button -->
      <button class="back-btn" (click)="back()">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="user-avatar-wrap">
        <img [src]="chat.userImage" [alt]="chat.username" class="user-avatar" />
        <span class="status-dot status-online"></span>
      </div>
      <div class="header-info">
        <h3 class="header-name">{{ chat.username }}</h3>
        <span class="header-status">Active now</span>
      </div>
    </div>

    <div class="header-right">
      <button class="header-btn deal-btn" (click)="toggleDealPanel()" [class.active]="showDealPanel">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
          <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
        </svg>
        <span class="btn-label">Trade Details</span>
      </button>

      <button class="header-btn icon-btn" title="More options">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
          <circle cx="12" cy="5" r="1.5"/><circle cx="12" cy="12" r="1.5"/><circle cx="12" cy="19" r="1.5"/>
        </svg>
      </button>
    </div>
  </div>

  <!-- DEAL PANEL (info-only, no confirm button) -->
  <div class="deal-panel" [class.visible]="showDealPanel">
    <div class="deal-panel-inner">
      <div class="deal-status-badge">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <polyline points="20 6 9 17 4 12"/>
        </svg>
        Exchange Confirmed
      </div>

      <div class="deal-items">
        <div class="deal-card mine">
          <div class="deal-card-label">You offer</div>
          <img [src]="chat.myItemImage" [alt]="chat.myItem" class="deal-item-img" />
          <div class="deal-item-name">{{ chat.myItem }}</div>
        </div>

        <div class="deal-swap-icon">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <polyline points="17 1 21 5 17 9"/><path d="M3 11V9a4 4 0 0 1 4-4h14"/>
            <polyline points="7 23 3 19 7 15"/><path d="M21 13v2a4 4 0 0 1-4 4H3"/>
          </svg>
        </div>

        <div class="deal-card their">
          <div class="deal-card-label">You receive</div>
          <img [src]="chat.theirItemImage" [alt]="chat.theirItem" class="deal-item-img" />
          <div class="deal-item-name">{{ chat.theirItem }}</div>
        </div>
      </div>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="messages-area">
    <div class="messages-inner">
      <div *ngFor="let message of messages; let i = index">

        <div *ngIf="i === 0" class="date-divider">
          <span>Today</span>
        </div>

        <div class="message-row" [class.mine]="message.mine" [class.theirs]="!message.mine">
          <div *ngIf="!message.mine" class="msg-avatar">
            <img [src]="chat.userImage" [alt]="chat.username" />
          </div>

          <div class="bubble-wrap">
            <div class="bubble" [class.mine]="message.mine" [class.theirs]="!message.mine">
              {{ message.text }}
            </div>
            <div class="msg-meta" [class.mine]="message.mine">
              <span class="msg-time">{{ message.timestamp }}</span>
              <span *ngIf="message.mine && message.status" class="msg-status">
                <svg *ngIf="message.status === 'delivered'" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                  <polyline points="20 6 9 17 4 12"/>
                </svg>
                <ng-container *ngIf="message.status === 'read'">
                  <svg width="16" height="12" viewBox="0 0 28 16" fill="none">
                    <polyline points="1,8 6,13 14,4" stroke="#7aaa92" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                    <polyline points="8,8 13,13 27,1" stroke="#7aaa92" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </ng-container>
              </span>
            </div>
          </div>
        </div>
      </div>
      <div #messagesEnd></div>
    </div>
  </div>

  <!-- INPUT AREA -->
  <div class="input-area">
    <div class="input-wrap">
      <button class="attach-btn" title="Attach image">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
          <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66l-9.2 9.19a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
        </svg>
      </button>

      <textarea
        [(ngModel)]="newMessage"
        (keydown)="onEnter($event)"
        placeholder="Type a message..."
        class="message-input"
        rows="1"
      ></textarea>

      <button
        class="send-btn"
        [class.active]="newMessage.trim().length > 0"
        (click)="sendMessage()"
        [disabled]="!newMessage.trim()"
      >
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
        </svg>
      </button>
    </div>

    <div class="input-hint">Press Enter to send · Shift+Enter for new line</div>
  </div>
</div>
