<div class="modal-backdrop" (click)="closeModal()">
  <div class="modal" (click)="$event.stopPropagation()">
    <div class="modal-head">
      <h2>{{ editingId ? 'Edit Listing' : 'Add New Listing' }}</h2>
      <button class="xbtn" type="button" (click)="closeModal()">×</button>
    </div>

    <form #f="ngForm" (ngSubmit)="save(f)" class="modal-body">
      <label class="lbl">Title</label>
      <input class="inp" name="title" [(ngModel)]="form.title" required placeholder="What are you listing?" />

      <label class="lbl">Description</label>
      <textarea class="ta" name="description" [(ngModel)]="form.description" required placeholder="Describe your item..."></textarea>

      <div class="row2">
        <div>
          <label class="lbl">Category</label>
          <select class="inp" name="category" [(ngModel)]="form.category" required>
            <option>Electronics</option>
            <option>Fashion</option>
            <option>Home & Garden</option>
            <option>Sports</option>
            <option>Books</option>
            <option>Other</option>
          </select>
        </div>

        <div>
          <label class="lbl">Condition</label>
          <select class="inp" name="condition" [(ngModel)]="form.condition" required>
            <option>New</option>
            <option>Like New</option>
            <option>Good</option>
            <option>Fair</option>
            <option>Poor</option>
          </select>
        </div>
      </div>

      <div class="row2">
        <div>
          <label class="lbl">Estimated Value ($)</label>
          <input class="inp" type="number" name="value" [(ngModel)]="form.value" min="0" />
        </div>

        <div>
          <label class="lbl">Location</label>
          <input class="inp" name="location" [(ngModel)]="form.location" required placeholder="City, State" />
        </div>
      </div>

      <!-- Images -->
      <div class="img-block">
        <div class="img-top">
          <label class="lbl">Images</label>
          <label class="upload-btn">
            <input type="file" accept="image/*" multiple (change)="onImagesSelected($event)" />
            + Add images
          </label>
        </div>

        <div class="thumbs" *ngIf="form.images.length > 0">
          <div class="thumb" *ngFor="let img of form.images; let i = index">
            <img [src]="img" alt="preview" />

            <div class="thumb-actions">
              <button type="button" class="mini" (click)="setCover(i)" title="Set cover">★</button>
              <button type="button" class="mini danger" (click)="removeImage(i)" title="Remove">✕</button>
            </div>

            <div class="cover" *ngIf="i === 0">Cover</div>
          </div>
        </div>

        <div class="hint">Tip: click ★ to set cover image. Max 8 images.</div>
      </div>

      <div class="modal-actions">
        <button class="btn-cancel" type="button" (click)="closeModal()">Cancel</button>
        <button class="btn-save" type="submit">{{ editingId ? 'Save Changes' : 'Add Listing' }}</button>
      </div>
    </form>
  </div>
</div>
